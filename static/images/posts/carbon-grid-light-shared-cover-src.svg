<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Nikita Kibitkin Engineering Blog shared article cover</title>
  <desc id="desc">Shared Carbon Grid Light style cover for article sharing cards.</desc>
  <defs>
    
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#f6f8fb" />
      <stop offset="100%" stop-color="#eef3f8" />
    </linearGradient>
    <linearGradient id="panel" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f8fbff" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="1050" cy="120" r="150" fill="#dbe8ff" opacity="0.75" />
  <circle cx="170" cy="520" r="180" fill="#e4eefc" opacity="0.82" />

  <rect x="64" y="64" width="1072" height="502" rx="28" fill="url(#panel)" stroke="#d7e0ea" stroke-width="2" />
  <rect x="104" y="104" width="992" height="422" rx="20" fill="none" stroke="#e6edf5" stroke-width="2" />

  <path d="M144 160h912M144 234h912M144 308h912M144 382h912M144 456h912" stroke="#ebf1f7" stroke-width="2" />
  <path d="M208 104v422M392 104v422M576 104v422M760 104v422M944 104v422" stroke="#f1f5fa" stroke-width="2" />

  <text x="146" y="164" fill="#4c8dff" font-family="IBM Plex Mono, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="24">Nikita Kibitkin / Engineering Blog</text>
  <text x="146" y="252" fill="#202633" font-family="Manrope, system-ui, sans-serif" font-size="50" font-weight="700">Pragmatic essays focused </text>
  <text x="146" y="324" fill="#202633" font-family="Manrope, system-ui, sans-serif" font-size="50" font-weight="700">on system design.</text>

  <text x="146" y="412" fill="#5f6979" font-family="Manrope, system-ui, sans-serif" font-size="35">Exploring design patterns, backend engineering</text>
  <text x="146" y="460" fill="#5f6979" font-family="Manrope, system-ui, sans-serif" font-size="35"> architectural trade-offs, and solutions that scale.</text>

  <rect x="884" y="148" width="150" height="150" fill="none" stroke="#4c8dff" stroke-width="5" />
  <rect x="932" y="196" width="150" height="150" fill="none" stroke="#9bbcff" stroke-width="5" />
  <rect x="980" y="244" width="70" height="70" fill="#4c8dff" />

</svg>
